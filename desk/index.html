<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Relay Desk · Not Your Normal Marketing</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Relay Desk" />
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

  <!-- Manifest omits "start_url"/"scope" on purpose so the install URL defaults to
       the current document URL (carrying ?k=<token>). Do NOT add start_url back. -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="../shared/relay-mark.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../shared/relay-icon-180.png" />

  <link rel="stylesheet" href="../shared/ui.css" />
  <link rel="stylesheet" href="./desk.css" />
</head>
<body>
  <!-- Liquid Glass nav: the Relay wordmark (the one branded element) -->
  <header class="appbar">
    <div class="wrap">
      <div class="wordmark" role="img" aria-label="Relay, by Not Your Normal Marketing">
        <svg class="wordmark-mark" viewBox="0 0 40 40" fill="none" aria-hidden="true" focusable="false">
          <g stroke="currentColor" stroke-width="3.6" stroke-linecap="round">
            <path d="M20 6 V34" />
            <path d="M6 20 H34" />
            <path d="M10.1 10.1 L29.9 29.9" />
            <path d="M29.9 10.1 L10.1 29.9" />
          </g>
        </svg>
        <span class="wordmark-text" aria-hidden="true">
          <span class="wordmark-name">Relay</span>
          <span class="wordmark-by">by Not Your Normal Marketing</span>
        </span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <!-- iOS large title -->
    <div class="large-title">
      <h1>Request Desk</h1>
      <p class="large-sub">Every client request, one queue</p>
    </div>

    <!-- Loading state -->
    <div id="view-loading" class="card">
      <div class="muted">Loading the desk…</div>
    </div>

    <!-- Bad-token state -->
    <div id="view-badtoken" class="card hidden">
      <h2>This link isn't valid</h2>
      <p class="muted small">The admin link you used isn't recognized. Open the Request Desk with your <code>?k=</code> admin token in the URL.</p>
    </div>

    <!-- Main app -->
    <div id="view-app" class="hidden">
      <!-- Top tab switch -->
      <nav id="tabs" class="tabs" role="tablist" aria-label="Desk views">
        <button class="tab active" data-view="requests" role="tab" aria-selected="true">
          Requests <span class="tab-count" id="count-requests"></span>
        </button>
        <button class="tab" data-view="events" role="tab" aria-selected="false">
          Events <span class="tab-count" id="count-events"></span>
        </button>
        <button class="tab" data-view="trucks" role="tab" aria-selected="false">
          Food Trucks <span class="tab-count" id="count-trucks"></span>
        </button>
        <button class="tab" data-view="history" role="tab" aria-selected="false">
          History <span class="tab-count" id="count-history"></span>
        </button>
        <button class="tab" data-view="clients" role="tab" aria-selected="false">
          Clients <span class="tab-count" id="count-clients"></span>
        </button>
      </nav>

      <!-- Requests view -->
      <section id="panel-requests" class="panel" role="tabpanel">
        <div class="filters">
          <div class="chip-row" id="filter-chips" aria-label="Filter requests by stage or client"></div>
        </div>
        <div id="requests-list"></div>
      </section>

      <!-- Events view -->
      <section id="panel-events" class="panel hidden" role="tabpanel">
        <div id="events-list"></div>
      </section>

      <!-- Food Trucks view: a month calendar of truck bookings, scoped to a
           food-truck client (default Eats). Marshall can add / edit / cancel a
           day's trucks here the same way the client does from the portal — for
           when he schedules on their behalf. The monthly schedule graphic is
           still approved through the normal Requests ready→approve flow. -->
      <section id="panel-trucks" class="panel hidden" role="tabpanel">
        <div id="trucks-body"></div>
      </section>

      <!-- History view: one searchable timeline of everything the worker and
           clients did — server activity log + threads + drafts + change notes.
           This is how desktop/VPS drafting work stays visible from the phone. -->
      <section id="panel-history" class="panel hidden" role="tabpanel">
        <input id="history-search" type="search" placeholder="Search everything — client, caption, request, action…"
               aria-label="Search history" autocomplete="off" />
        <div id="history-list"></div>
      </section>

      <!-- Clients view -->
      <section id="panel-clients" class="panel hidden" role="tabpanel">
        <div id="clients-list"></div>

        <div class="section-label">Add a client</div>
        <form id="client-form" class="card stack" autocomplete="off">
          <div>
            <label for="cl-id">Client ID <span class="muted">(slug, e.g. the-o)</span></label>
            <input id="cl-id" type="text" placeholder="the-o" required />
          </div>
          <div>
            <label for="cl-name">Display name</label>
            <input id="cl-name" type="text" placeholder="The O" required />
          </div>
          <div>
            <label for="cl-brand">Brand slug <span class="muted">(optional)</span></label>
            <input id="cl-brand" type="text" placeholder="the-o" />
          </div>
          <div>
            <label for="cl-pin">PIN <span class="muted">(optional, 4 digits)</span></label>
            <input id="cl-pin" type="text" inputmode="numeric" maxlength="8" placeholder="leave blank for none" />
          </div>
          <button id="cl-submit" type="submit" class="btn primary block">Save client</button>
        </form>
      </section>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
